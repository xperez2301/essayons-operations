</div>

<script>

const MAX_CAPACITY = 25001;

function updateTotals(){

    let stores = 0;
    let racks = 0;
    let weight = 0;

    document.querySelectorAll(".store-box").forEach(box => {

        if(box.checked &&
           box.parentElement.style.display !== "none"){

            stores++;

            racks += Number(box.dataset.racks);

            weight += Number(box.dataset.weight);

        }

    });

    document.getElementById("store-count").innerText = stores;
    document.getElementById("rack-count").innerText = racks;
    document.getElementById("weight-count").innerText = weight;

    document.getElementById("remaining-capacity").innerText =
        MAX_CAPACITY - weight;

    let status =
        document.getElementById("capacity-status");

    if(weight > MAX_CAPACITY){

        status.innerText = "OVER LIMIT";

    }else if(weight > 22000){

        status.innerText = "WARNING";

    }else{

        status.innerText = "SAFE";

    }

}

document.addEventListener("change", updateTotals);

function assignDriver(){

    let driver =
        document.getElementById("driver-select").value;

    if(!driver){
        alert("Select a driver");
        return;
    }

    let selected =
        document.querySelectorAll(".store-box:checked");

    if(selected.length === 0){
        alert("Select stores first");
        return;
    }

    let routeBlock =
        document.createElement("div");

    routeBlock.style.border =
        "1px solid #ccc";

    routeBlock.style.padding =
        "10px";

    routeBlock.style.marginBottom =
        "10px";

    routeBlock.innerHTML =
        "<h4>" + driver + "</h4>";

    selected.forEach(box => {

        let label =
            box.parentElement;

        let store =
            label.innerText.trim();

        let row =
            document.createElement("div");

        row.innerHTML =
            store +
            " <button onclick='restoreStore(this)'>Unassign</button>";

        routeBlock.appendChild(row);

        label.style.display = "none";

        box.checked = false;

    });

    document.getElementById("driver-results")
            .appendChild(routeBlock);

    updateTotals();

}

function restoreStore(btn){

    let storeText =
        btn.parentElement.innerText
           .replace("Unassign","")
           .trim();

    document.querySelectorAll(".store-box")
        .forEach(box => {

        let label =
            box.parentElement;

        let text =
            label.innerText.trim();

        if(text === storeText){

            label.style.display =
                "block";

        }

    });

    btn.parentElement.remove();

    updateTotals();

}

function initMap(){

    const map =
        new google.maps.Map(
            document.getElementById("map"),
            {
                zoom:6,
                center:{
                    lat:30.2672,
                    lng:-97.7431
                }
            }
        );

    const locations = [

        {
            lat:29.4241,
            lng:-98.4936,
            title:"San Antonio Hub"
        },

        {
            lat:29.7604,
            lng:-95.3698,
            title:"Houston Hub"
        },

        {
            lat:32.7767,
            lng:-96.7970,
            title:"Dallas Hub"
        },

        {
            lat:30.0802,
            lng:-94.1266,
            title:"Walmart #1001"
        },

        {
            lat:31.1171,
            lng:-97.7278,
            title:"Home Depot #2001"
        },

        {
            lat:29.8833,
            lng:-97.9414,
            title:"Lowe's #3001"
        }

    ];

    locations.forEach(location => {

        new google.maps.Marker({

            position:{
                lat:location.lat,
                lng:location.lng
            },

            map:map,

            title:location.title

        });

    });

}

</script>

<script async
src="https://maps.googleapis.com/maps/api/js?key=AIzaSyAH0B8_yxpIoWHhAape38sR51-sxEiEoMk&callback=initMap">
</script>
