<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>EOMS Login | Essayons Operations</title>
<link rel="stylesheet" href="{{ url_for('static', filename='css/eoms.css') }}">
</head>
<body class="login-body">
  <form class="login-card" method="POST" action="/login">
    <div class="login-crest">
      <div class="logo">⚒</div>
      <div>
        <h1>EOMS</h1>
        <p>Essayons Operations</p>
      </div>
    </div>
    <div class="login-banner">We are building the route — import, map, assign, dispatch, complete.</div>
    {% if error %}<div class="err">{{ error }}</div>{% endif %}
    <input type="hidden" name="next" value="{{ next or '/dispatch-map' }}">
    <label for="username">Username</label>
    <input id="username" name="username" placeholder="Enter username" required autofocus>
    <label for="password">Password</label>
    <input id="password" name="password" type="password" placeholder="Enter password" required>
    <button class="primary-btn login-btn" type="submit">Enter Dispatch Portal</button>
  </form>
</body>
</html>
