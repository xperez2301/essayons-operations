<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EOMS Admin Login</title>
  <style>
    *{box-sizing:border-box}
    body{margin:0;min-height:100vh;font-family:Arial,Helvetica,sans-serif;background:linear-gradient(135deg,#020617,#0f172a,#111827);color:#e5e7eb;display:flex;align-items:center;justify-content:center;padding:24px}
    .box{width:min(430px,100%);background:#0f172a;border:1px solid #334155;border-radius:22px;box-shadow:0 20px 60px rgba(0,0,0,.45);padding:30px}
    .brand{display:flex;align-items:center;gap:12px;margin-bottom:20px}
    .badge{width:48px;height:48px;border-radius:14px;background:#22c55e;color:#052e16;font-weight:900;display:flex;align-items:center;justify-content:center;font-size:22px}
    h1{margin:0 0 8px;font-size:28px}
    p{margin:0 0 20px;color:#94a3b8;line-height:1.4}
    label{display:block;margin:14px 0 7px;color:#cbd5e1;font-weight:700;font-size:14px}
    input{width:100%;padding:14px;border-radius:12px;border:1px solid #475569;background:#020617;color:#fff;font-size:16px}
    button{width:100%;margin-top:22px;padding:14px;border:0;border-radius:12px;background:#22c55e;color:#052e16;font-weight:900;font-size:16px;cursor:pointer}
    .error{background:rgba(239,68,68,.15);border:1px solid rgba(239,68,68,.4);color:#fecaca;padding:12px;border-radius:12px;margin-bottom:14px}
    .foot{margin-top:18px;text-align:center;color:#64748b;font-size:12px}
  </style>
</head>
<body>
  <main class="box">
    <div class="brand">
      <div class="badge">E</div>
      <div>
        <strong>EOMS</strong><br>
        <span style="color:#94a3b8;font-size:13px;">Essayons Operations Management System</span>
      </div>
    </div>
    <h1>Admin Login</h1>
    <p>Authorized dispatch and operations access only.</p>
    {% if error %}<div class="error">{{ error }}</div>{% endif %}
    <form method="POST" action="/login">
      <input type="hidden" name="next" value="{{ next or '/dispatch-map' }}">
      <label>Username</label>
      <input name="username" autocomplete="username" required autofocus>
      <label>Password</label>
      <input name="password" type="password" autocomplete="current-password" required>
      <button type="submit">Enter Dispatch Portal</button>
    </form>
    <div class="foot">Essayons Bax Recovery & Logistics</div>
  </main>
</body>
</html>
