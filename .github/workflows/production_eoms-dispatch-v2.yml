name: EOMS Deployment Recovery

on:
  push:
    branches:
      - deployment-recovery
  workflow_dispatch:

env:
  AZURE_WEBAPP_NAME: eoms-dispatch-v2
  PYTHON_VERSION: '3.12'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout deployment recovery branch
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install and validate dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          python -c "import requests; print('requests OK')"
          python -m py_compile app.py

      - name: Deploy to Azure App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          publish-profile: ${{ secrets.AZUREAPPSERVICE_PUBLISHPROFILE_EF341DB5C8C74CAC8D91DC24EF3A8AC9 }}
          package: .