name: Build and deploy EOMS to Azure Web App - eoms-dispatch

on:
  push:
    branches:
      - main
      - production
  workflow_dispatch:

env:
  PYTHON_VERSION: '3.11'
  AZURE_WEBAPP_NAME: eoms-dispatch

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Syntax check
        run: python -m py_compile app.py

      - name: Upload app artifact
        uses: actions/upload-artifact@v4
        with:
          name: eoms-app
          path: |
            .
            !.git/
            !.github/
            !**/__pycache__/
            !**/*.pyc
            !.env
            !.venv/
            !venv/
            !env/
            !runtime/
            !data/
            !bol_files/
            !uploads/
            !diagnostics/
            !RMS_Browser_Profile*/
            !*.zip

  deploy:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download app artifact
        uses: actions/download-artifact@v4
        with:
          name: eoms-app

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          slot-name: Production
          publish-profile: ${{ secrets.AZUREAPPSERVICE_PUBLISHPROFILE_7B58759A34D04AFB831B18678A70C081 }}
