name: Build and deploy EOMS to Azure App Service

on:
  push:
    branches:
      - main
  workflow_dispatch:        # lets you trigger a deploy manually from the Actions tab

env:
  AZURE_WEBAPP_NAME: REPLACE-WITH-YOUR-APP-NAME   # <-- set this to your Azure Web App name
  PYTHON_VERSION: '3.11'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Syntax check
        run: python -m py_compile app.py

      - name: Upload artifact for deployment
        uses: actions/upload-artifact@v4
        with:
          name: eoms-app
          path: |
            .
            !.git/
            !.github/
            !**/__pycache__/

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: Production
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: eoms-app

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
